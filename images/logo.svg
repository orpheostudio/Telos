<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
        </filter>
    </defs>
    
    <!-- Background circle with gradient -->
    <circle cx="100" cy="100" r="90" fill="url(#gradient)" filter="url(#shadow)"/>
    
    <!-- Stylized 'T' letter -->
    <text x="100" y="140" font-size="100" text-anchor="middle" 
          fill="white" font-family="Arial, sans-serif" font-weight="bold"
          filter="url(#shadow)">T</text>
    
    <!-- AI connection lines (neural network style) -->
    <g stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8">
        <line x1="60" y1="60" x2="140" y2="140"/>
        <line x1="140" y1="60" x2="60" y2="140"/>
    </g>
    
    <!-- Small nodes at ends -->
    <circle cx="60" cy="60" r="8" fill="white"/>
    <circle cx="140" cy="140" r="8" fill="white"/>
    <circle cx="140" cy="60" r="8" fill="white"/>
    <circle cx="60" cy="140" r="8" fill="white"/>
    
    <!-- Outer ring for premium feel -->
    <circle cx="100" cy="100" r="95" fill="none" stroke="white" 
            stroke-width="2" stroke-dasharray="8 8" opacity="0.3"/>
</svg>
